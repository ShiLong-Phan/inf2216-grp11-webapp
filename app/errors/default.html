<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta content="nofollow,noarchive,noindex" name="robots">
  <meta http-equiv="refresh" content="0;url=https://crumbly.mooo.com">
  <title>Blank</title>
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="Nothing to see here..." name="description">
  <meta content="Nothing to see here..." property="og:description">
  <meta content="Nothing to see here..." property="twitter:description">
  <style nonce="{*nonce_style*}">
    :root {
      --color-primary: #fff;
      --color-inverted: #202020;
      --color-primary-light: #494949;
      --color-bw: #0b5577;
      --color-bw-green: #2eac68;
    }

    body, html {
      background-color: #fff;
      color: #202020;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary: #1a1a1a;
        --color-inverted: #fff;
        --color-primary-light: #a3a3a3;
        --color-bw: #fff;
      }
    }

    body, html {
      margin: 0;
      padding: 0;
      min-height: 100%;
      height: 100%;
      width: 100%;
      background-color: var(--color-primary, #fff);
      color: var(--color-inverted, #202020);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
    }

    @media screen and (min-width: 2000px) {
      body, html {
        font-size: 20px;
      }
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      flex-direction: column;
    }

    article {
      text-align: center;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      flex-grow: 1;
    }

    article h3 {
      font-size: 2em;
      text-transform: uppercase;
      margin: 0.3em auto;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 1rem 0;
      margin-top: auto;
      padding-top: 0.25em;
      padding-bottom: 0.25em;
    }

    footer p {
      font-family: monospace;
      font-size: 1em;
      color: var(--color-primary-light, #a3a3a3);
      margin-block-start: 0.25em;
      margin-block-end: 0.25em;
    }

    footer a {
      color: var(--color-inverted, #202020);
      text-decoration: underline;
      font-weight: 700;
      transition: color 0.3s ease, text-decoration 0.3s ease, font-style 0.3s ease;
    }

    footer a:focus,
    footer a:hover {
      font-style: italic;
      color: var(--color-bw-green, #2eac68);
      outline: 0;
    }


  </style>
</head>
<body>
  <article>
    <h3>Redirecting to Crumbly</h3>
  </article>
  <footer>
  </footer>
</body>
</html>
