services:
  bunkerweb:
    image: bunkerity/bunkerweb-all-in-one:1.6.1
    ports:
      - "80:8080/tcp"
      - "443:8443/tcp"
      - "443:8443/udp" # QUIC
      # - "8888:7000/tcp"
    environment:
      SERVICE_SCHEDULER: "yes"
      SERVICE_UI: "yes"
      AUTOCONF_MODE: "no"
    volumes:
      - bw-data:/data
    networks:
      - app-network
  web:
    image: nginx:stable-alpine
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./nginx/migration.conf:/etc/nginx/conf.d/default.conf
      - ./app:/var/www/html
      # - certbot_data:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - php
      - splunk
      - bunkerweb
    networks:
      - app-network
    # logging:
    #     driver: "splunk"
    #     options:
    #       splunk-url: "http://172.29.0.3:8088"
    #       splunk-token: "39b391c6-21b0-402a-a18f-0876adef6afa"
    #       splunk-insecureskipverify: "true"


  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    volumes:
      - ./app:/var/www/html
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - PHP_MEMORY_LIMIT=256M
      - PHP_UPLOAD_MAX_FILESIZE=100M
      - PHP_POST_MAX_SIZE=100M
    networks:
      - app-network

  db:
    image: mysql:8.0
    volumes:
      - db_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: ssdgroup11db
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    # ports:
    #   - "3306:3306"
    networks:
      - app-network

  splunk:
    image: splunk/splunk:latest
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=KR97UP1vgFpnKIuO5ZaW
    # ports:
      # - "8888:8000" #Web GUI
      - "8088:8088" #HEC Token
      # - "9997:9997"
    volumes:
      - ./splunk:/opt/splunk/etc
      - ./splunk/logs:/opt/splunk/var/log/splunk # all splunk logs will be copied into splunk/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # - /home/student11/ict2216/cert:/cert:ro
    networks:
      - app-network

volumes:
  db_data:
  bw-data:
  # certbot_data:

networks:
  app-network:
    # driver: bridge