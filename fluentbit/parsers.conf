[PARSER]
    Name   bunkerweb
    Format regex
    Regex  ^(?<remote_host>\S+) (?<client_ip>\S+) \S+ \S+ \[(?<time>[^\]]+)\] "(?<method>\S+)? (?<request>[^\"]+)? (?<protocol>[^"]+)?" (?<status>\d{3}) (?<bytes_sent>\d+) "(?<referrer>[^\"]*)" "(?<user_agent>[^\"]*)"
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z
    Time_Keep   On

# --- NEW PARSER FOR FAIL2BAN LOGS ---
[PARSER]
    Name        fail2ban
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) (?<module>[^ ]+) +\[\d+\]: (?<level>[A-Z]+) +\[(?<target>[^\]]+)\] (?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S,%L
    Time_Keep   On
