name: OWASP Dependency Check

on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "INF2216-Group11-WebApp"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          args: >
            --enableExperimental
            --failOnCVSS 7
            --scan ./vendor

      - name: Warn for CVSS 4.0–6.9 vulnerabilities
        run: |
          echo "Scanning for medium severity CVSS scores (4.0–6.9)..."
          MEDIUM_VULNS=$(grep -E 'CVSS Score: [4-6]\.' dependency-check-report/dependency-check-report.html | uniq)
          if [ -n "$MEDIUM_VULNS" ]; then
            echo "⚠️ Warning: Medium severity vulnerabilities found (CVSS 4.0–6.9):"
            echo "$MEDIUM_VULNS"
          else
            echo "No medium severity vulnerabilities (CVSS 4.0–6.9) found."
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report
