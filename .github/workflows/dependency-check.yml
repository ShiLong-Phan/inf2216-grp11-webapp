name: OWASP Dependency Check

on:
  # Run on schedule (weekly)
  schedule:
    - cron: '0 0 * * 0'  # Run at midnight every Sunday
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Run on specific events (optional)
  push:
    branches: [ main ]
    paths:
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    branches: [ main ]
    paths:
      - 'composer.json'
      - 'composer.lock'

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, mysqli, pdo_mysql, curl
      
      - name: Create temporary composer environment
        run: |
          # Create temp directory for dependency scanning
          mkdir -p /tmp/dependency-scan
          cd /tmp/dependency-scan
          
          # Create a dedicated composer.json for scanning
          echo '{
            "name": "inf2216-grp11/webapp",
            "description": "Crumbly - A secure baking e-commerce web application",
            "require": {
              "php": ">=7.4",
              "stripe/stripe-php": "^17.3.0",
              "ext-curl": "*",
              "ext-json": "*",
              "ext-mbstring": "*"
            }
          }' > composer.json
          
          # Install dependencies
          composer install --no-progress --prefer-dist --no-dev
      
      - name: Create empty suppression file
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <suppressions xmlns="https://jeremylong.github.io/DependencyCheck/dependency-suppression.1.3.xsd">
          </suppressions>' > /tmp/suppression.xml
      
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'inf2216-grp11-webapp'
          path: '/tmp/dependency-scan'
          format: 'HTML'
          out: 'reports'
          args: >
            --scan /tmp/dependency-scan/composer.json
            --scan /tmp/dependency-scan/vendor
            --enableExperimental
            --suppression /tmp/suppression.xml
      
      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports
      
      - name: Check for high-severity vulnerabilities
        run: |
          if [ -f "reports/dependency-check-report.html" ] && grep -q "CRITICAL\|HIGH" reports/dependency-check-report.html; then
            echo "⚠️ HIGH OR CRITICAL VULNERABILITIES FOUND! Review the dependency check report."
            echo "This is set to not fail the build, but should be reviewed before production deployment."
          else
            echo "✅ No high or critical vulnerabilities found."
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Dependency-Check-Report
          path: dependency-check-report
         