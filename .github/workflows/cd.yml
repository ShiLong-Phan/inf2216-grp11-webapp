# .github/workflows/cd.yml
name: Continuous Deployment

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'
  workflow_dispatch:  # Add this line

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker images
        run: |
          # Set environment variables for Docker Compose
          cat > .env << EOL
          SPLUNK_HEC_BUNKERTOKEN=${{ secrets.SPLUNK_HEC_BUNKERTOKEN }}
          SPLUNK_HEC_FAIL2BANTOKEN=${{ secrets.SPLUNK_HEC_FAIL2BANTOKEN }}
          SPLUNK_HEC_NGINXTOKEN=${{ secrets.SPLUNK_HEC_NGINXTOKEN }}
          SPLUNK_PASSWORD=${{ secrets.SPLUNK_PASSWORD }}
          EOL

          # Get lowercase repository name
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Build images
          docker-compose build
          
          # Debug info
          echo "Listing all docker images:"
          docker images
          
          # Find the PHP image by looking for the correct pattern
          # Note: The image name has a hyphen (-) not an underscore (_)
          PHP_IMAGE_NAME="inf2216-grp11-webapp-php:latest"
          
          # Verify image exists
          if docker image inspect $PHP_IMAGE_NAME > /dev/null 2>&1; then
            echo "Found PHP image: $PHP_IMAGE_NAME"
            
            # Tag images for GitHub Container Registry with lowercase repository name
            docker tag $PHP_IMAGE_NAME ghcr.io/${REPO_LOWERCASE}/crumbly-php:latest
            docker tag $PHP_IMAGE_NAME ghcr.io/${REPO_LOWERCASE}/crumbly-php:${{ github.sha }}
            
            # Push images to registry
            docker push ghcr.io/${REPO_LOWERCASE}/crumbly-php:latest
            docker push ghcr.io/${REPO_LOWERCASE}/crumbly-php:${{ github.sha }}
          else
            echo "Error: PHP image not found!"
            # List all images for debugging
            echo "Available images:"
            docker images
            exit 1
          fi
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Create a backup directory if it doesn't exist
            mkdir -p /var/backups/crumbly
            
            # Navigate to application directory
            cd /app
            
            # Backup the database
            docker exec $(docker ps -qf name=db) sh -c 'exec mysqldump -u$MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE' > /var/backups/crumbly/db-backup-$(date +%Y%m%d-%H%M%S).sql || echo "Database backup failed, continuing deployment"
            
            # Pull the latest code
            git pull origin main
            
            # Install Docker Compose if not present
            if ! command -v docker-compose &> /dev/null; then
              curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi
            
            # Update the application
            docker-compose pull
            docker-compose down

            # Start Splunk first and wait for it to be available
            docker-compose up -d splunk
            echo "Waiting for Splunk to initialize..."
            sleep 60  # Give Splunk time to start
            docker-compose up -d
            
            # Check if containers are running
            docker-compose ps
            
            # Clean up unused resources
            rm -f .env
            docker system prune -a -f --volumes
            
            echo "Deployment completed successfully"
      - name: Local cleanup
        if: always()  # Run even if previous steps failed
        run: |
          docker-compose down -v || true
          rm -f .env || true
          docker system prune -f || true