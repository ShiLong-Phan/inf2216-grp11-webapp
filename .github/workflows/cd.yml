name: Continuous Deployment

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker images
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/crumbly-php:latest
            ghcr.io/${{ github.repository }}/crumbly-php:${{ github.sha }}
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Create a backup directory if it doesn't exist
            mkdir -p /var/backups/crumbly
            
            # Backup the database
            cd /path/to/your/app
            docker exec $(docker ps -qf name=db) sh -c 'exec mysqldump -u root -p"$pass" ssdgroup11db' > /var/backups/crumbly/db-backup-$(date +%Y%m%d-%H%M%S).sql
            
            # Pull the latest code
            git pull origin main
            
            # Update the application
            docker-compose pull
            docker-compose down
            docker-compose up -d
            
            # Clean up unused resources
            docker system prune -af --volumes