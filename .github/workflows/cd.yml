# .github/workflows/cd.yml
name: Continuous Deployment

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'
  workflow_dispatch:  # Add this line

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Docker images
        run: |
          # Set environment variables for Docker Compose
          cat > .env << EOL
          SPLUNK_HEC_BUNKERTOKEN=${{ secrets.SPLUNK_HEC_BUNKERTOKEN }}
          SPLUNK_HEC_FAIL2BANTOKEN=${{ secrets.SPLUNK_HEC_FAIL2BANTOKEN }}
          SPLUNK_HEC_NGINXTOKEN=${{ secrets.SPLUNK_HEC_NGINXTOKEN }}
          SPLUNK_PASSWORD=${{ secrets.SPLUNK_PASSWORD }}

          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}

          DB_HOST=${{secrets.DB_HOST}}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}

          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          EOL

          # Get lowercase repository name
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Build images
          docker-compose build
          
          # Debug info
          echo "Listing all docker images:"
          docker images
          
          # Find the PHP image by looking for the correct pattern
          # Note: The image name has a hyphen (-) not an underscore (_)
          PHP_IMAGE_NAME="inf2216-grp11-webapp-php:latest"
          
          # Verify image exists
          if docker image inspect $PHP_IMAGE_NAME > /dev/null 2>&1; then
            echo "Found PHP image: $PHP_IMAGE_NAME"
            
            # Tag images for GitHub Container Registry with lowercase repository name
            docker tag $PHP_IMAGE_NAME ghcr.io/${REPO_LOWERCASE}/crumbly-php:latest
            docker tag $PHP_IMAGE_NAME ghcr.io/${REPO_LOWERCASE}/crumbly-php:${{ github.sha }}
            
            # Push images to registry
            docker push ghcr.io/${REPO_LOWERCASE}/crumbly-php:latest
            docker push ghcr.io/${REPO_LOWERCASE}/crumbly-php:${{ github.sha }}
          else
            echo "Error: PHP image not found!"
            # List all images for debugging
            echo "Available images:"
            docker images
            exit 1
          fi
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Set proper shell and error handling
            set -e
            export SHELL=/bin/bash
            
            # Check current directory and environment
            echo "Current directory: $(pwd)"
            echo "User: $(whoami)"
            echo "Groups: $(groups)"
            
            # Navigate to the correct application directory
            APP_DIR="$HOME/ict2216"
            echo "Navigating to application directory: $APP_DIR"
            
            if [ ! -d "$APP_DIR" ]; then
              echo "Error: Application directory $APP_DIR does not exist"
              echo "Available directories in $HOME:"
              ls -la $HOME/
              exit 1
            fi
            
            cd "$APP_DIR"
            
            # Verify we're in the correct directory with docker-compose.yml
            if [ ! -f "docker-compose.yml" ]; then
              echo "Error: docker-compose.yml not found in $APP_DIR"
              echo "Directory contents:"
              ls -la
              exit 1
            fi
            
            # Create backup directory (use home directory if /var/backups fails)
            BACKUP_DIR="$HOME/backups/crumbly"
            if ! mkdir -p "$BACKUP_DIR" 2>/dev/null; then
              echo "Cannot create backup directory in home, trying with sudo"
              sudo mkdir -p /var/backups/crumbly 2>/dev/null && BACKUP_DIR="/var/backups/crumbly" || {
                echo "Backup directory creation failed, skipping backup"
                BACKUP_DIR=""
              }
            fi
            
            # Check if user is in docker group, use sudo if needed
            if groups | grep -q docker; then
              DOCKER_CMD="docker"
              DOCKER_COMPOSE_CMD="docker-compose"
              echo "User is in docker group, using direct docker commands"
            else
              DOCKER_CMD="sudo docker"
              DOCKER_COMPOSE_CMD="sudo docker-compose"
              echo "User not in docker group, using sudo for docker commands"
            fi
            
            # Backup the database if containers are running and backup dir exists
            if [ -n "$BACKUP_DIR" ]; then
              echo "Checking for running database container..."
              DB_CONTAINER=$($DOCKER_CMD ps -qf name=ict2216_db 2>/dev/null || true)
              if [ -n "$DB_CONTAINER" ]; then
                echo "Backing up database..."
                $DOCKER_CMD exec "$DB_CONTAINER" sh -c 'exec mysqldump -u$MYSQL_USER -p$MYSQL_PASSWORD $MYSQL_DATABASE' > "$BACKUP_DIR/db-backup-$(date +%Y%m%d-%H%M%S).sql" 2>/dev/null || echo "Database backup failed, continuing deployment"
              else
                echo "No database container found (looking for ict2216_db), skipping backup"
              fi
            fi
            
            # Pull the latest code
            echo "Pulling latest code..."
            if [ -d ".git" ]; then
              git pull origin main || {
                echo "Git pull failed, trying to reset and pull"
                git fetch origin
                git reset --hard origin/main
              }
            else
              echo "Not a git repository, skipping git pull"
            fi
            
            # Stop all services first
            echo "Stopping all services..."
            $DOCKER_COMPOSE_CMD down || echo "Docker compose down failed, continuing"
            
            # Pull latest images
            echo "Pulling latest images..."
            $DOCKER_COMPOSE_CMD pull || echo "Docker compose pull failed, continuing"
            
            # Start Splunk FIRST and wait for it to be ready
            echo "Starting Splunk container first..."
            $DOCKER_COMPOSE_CMD up -d splunk || {
              echo "Splunk start failed, but continuing"
            }
            
            # Wait for Splunk to be ready
            echo "Waiting for Splunk to initialize..."
            SPLUNK_READY=false
            for i in {1..12}; do  # Try for 2 minutes (12 * 10 seconds)
              if $DOCKER_CMD ps --format "table {{.Names}}\t{{.Status}}" | grep -q "ict2216_splunk.*healthy\|ict2216_splunk.*Up"; then
                echo "Splunk is ready (attempt $i)"
                SPLUNK_READY=true
                break
              fi
              echo "Waiting for Splunk to be ready (attempt $i/12)..."
              sleep 10
            done
            
            if [ "$SPLUNK_READY" = false ]; then
              echo "Warning: Splunk may not be fully ready, but continuing with deployment"
            fi
            
            # Start database next (some services depend on it)
            echo "Starting database container..."
            $DOCKER_COMPOSE_CMD up -d db || {
              echo "Database start failed, but continuing"
            }
            
            # Wait a bit for database to be ready
            echo "Waiting for database to be ready..."
            sleep 15
            
            # Start all remaining services
            echo "Starting all services..."
            $DOCKER_COMPOSE_CMD up -d || {
              echo "Failed to start all services, checking individual services..."
              $DOCKER_COMPOSE_CMD ps
              echo "Checking logs for errors:"
              $DOCKER_COMPOSE_CMD logs --tail=20
            }
            
            # Final wait for all services to stabilize
            echo "Waiting for all services to stabilize..."
            sleep 10
            
            # Check if containers are running
            echo "Final container status:"
            $DOCKER_COMPOSE_CMD ps || echo "Failed to get container status"
            
            # Show detailed status
            echo "Detailed container information:"
            $DOCKER_CMD ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" || echo "Failed to list containers"
            
            # Clean up unused resources (be conservative)
            echo "Cleaning up unused Docker resources..."
            $DOCKER_CMD image prune -f || true
            
            # Check if key services are running
            echo "Checking key services..."
            if $DOCKER_CMD ps --format "{{.Names}}" | grep -q "ict2216_web"; then
              echo "✓ Web service is running"
            else
              echo "✗ Web service is NOT running"
            fi
            
            if $DOCKER_CMD ps --format "{{.Names}}" | grep -q "ict2216_php"; then
              echo "✓ PHP service is running"
            else
              echo "✗ PHP service is NOT running"
            fi
            
            if $DOCKER_CMD ps --format "{{.Names}}" | grep -q "ict2216_db"; then
              echo "✓ Database service is running"
            else
              echo "✗ Database service is NOT running"
            fi
            
            if $DOCKER_CMD ps --format "{{.Names}}" | grep -q "ict2216_splunk"; then
              echo "✓ Splunk service is running"
            else
              echo "✗ Splunk service is NOT running"
            fi
            
            echo "Deployment completed successfully"

      - name: Local cleanup
        if: always()  # Run even if previous steps failed
        run: |
          docker-compose down -v || true
          rm -f .env || true
          docker system prune -f || true