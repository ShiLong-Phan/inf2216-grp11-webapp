# .github/workflows/cd.yml
name: Continuous Deployment

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker images
        run: |
          # Get lowercase repository name
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          # Build images and check what was actually built
          docker-compose build
          echo "Listing available Docker images:"
          docker images
          
          # Figure out the correct image name
          # The format may vary based on Docker Compose version and configuration
          IMAGE_NAME="$(basename $(pwd))_php"
          echo "Using image name: ${IMAGE_NAME}"
          
          # Tag images for GitHub Container Registry with lowercase repository name
          docker tag ${IMAGE_NAME}:latest ghcr.io/${REPO_LOWERCASE}/crumbly-php:latest
          docker tag ${IMAGE_NAME}:latest ghcr.io/${REPO_LOWERCASE}/crumbly-php:${{ github.sha }}
          
          # Push images to registry
          docker push ghcr.io/${REPO_LOWERCASE}/crumbly-php:latest
          docker push ghcr.io/${REPO_LOWERCASE}/crumbly-php:${{ github.sha }}
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Create a backup directory if it doesn't exist
            mkdir -p /var/backups/crumbly
            
            # Navigate to application directory
            cd /path/to/your/app
            
            # Backup the database
            docker exec $(docker ps -qf name=db) sh -c 'exec mysqldump -u root -p"$MYSQL_ROOT_PASSWORD" ssdgroup11db' > /var/backups/crumbly/db-backup-$(date +%Y%m%d-%H%M%S).sql || echo "Database backup failed, continuing deployment"
            
            # Pull the latest code
            git pull origin main
            
            # Install Docker Compose if not present
            if ! command -v docker-compose &> /dev/null; then
              curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi
            
            # Update the application
            docker-compose pull
            docker-compose down
            docker-compose up -d
            
            # Check if containers are running
            docker-compose ps
            
            # Clean up unused resources
            docker system prune -af --volumes
            
            echo "Deployment completed successfully"