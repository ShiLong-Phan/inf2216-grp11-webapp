# .github/workflows/ci.yml
name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Code Linting & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, mysqli, pdo_mysql
      
      - name: Check PHP syntax
        run: |
          find ./app -name "*.php" -print0 | xargs -0 -n1 php -l
  
  security-scan:
    name: Security Vulnerabilities Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, mysqli, pdo_mysql
      
      - name: Run Security Scan
        run: |
          # Basic file permission checks
          find ./app -type f -name "*.php" -exec chmod 644 {} \;
          
          # Check for common security issues
          grep -r "eval(" ./app || echo "No eval() found"
          grep -r "system(" ./app || echo "No system() found"
          grep -r "exec(" ./app || echo "No exec() found"
          grep -r "shell_exec(" ./app || echo "No shell_exec() found"
          
          # Check for hardcoded credentials
          grep -r "password.*=" ./app || echo "Check any password references"
          grep -r "apikey.*=" ./app || echo "Check any API key references"
  
  build-test:
    name: Build & Test Docker Environment
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      
      - name: Build Docker images
        run: |
          docker-compose build
      
      - name: Run Docker Compose
        run: |
          docker-compose up -d
      
      - name: Wait for services to start
        run: sleep 15
      
      - name: Check container status
        run: |
          docker ps
          docker-compose ps
      
      - name: Check web server availability
        run: |
          curl -I http://localhost || true
      
      - name: Check for container errors
        run: |
          docker-compose logs
      
      - name: Clean up
        run: |
          docker-compose down
          docker system prune -af --volumes
  
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [build-test]
    if: always()
    steps:
      - name: Check build status
        if: needs.build-test.result == 'success'
        run: echo "✅ CI Pipeline passed successfully! Ready for deployment."
      
      - name: Check build failure
        if: needs.build-test.result != 'success'
        run: echo "❌ CI Pipeline failed. Please check the logs for details."