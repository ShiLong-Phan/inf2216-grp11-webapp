# .github/workflows/ci.yml
name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Code Linting & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, mysqli, pdo_mysql
      
      - name: Check PHP syntax
        run: |
          find ./app -name "*.php" -print0 | xargs -0 -n1 php -l
  
  security-scan:
    name: Security Vulnerabilities Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, mysqli, pdo_mysql
      
      - name: Run Security Scan
        run: |
          # Basic file permission checks
          find ./app -type f -name "*.php" -exec chmod 644 {} \;
          
          # Check for common security issues
          grep -r "eval(" ./app || echo "No eval() found"
          grep -r "system(" ./app || echo "No system() found"
          grep -r "exec(" ./app || echo "No exec() found"
          grep -r "shell_exec(" ./app || echo "No shell_exec() found"
          
          # Check for hardcoded credentials
          grep -r "password.*=" ./app || echo "Check any password references"
          grep -r "apikey.*=" ./app || echo "Check any API key references"
  
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, mysqli, pdo_mysql
      
      - name: Install Composer dependencies
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-progress --prefer-dist --optimize-autoloader
          else
            echo "No composer.json found, creating minimal file for dependency analysis"
            echo '{
              "name": "inf2216-grp11/webapp",
              "description": "Crumbly - A secure web application",
              "require": {
                "php": ">=8.0",
                "phpmailer/phpmailer": "^6.8",
                "stripe/stripe-php": "^10.0"
              }
            }' > composer.json
            composer install --no-progress --prefer-dist --optimize-autoloader
          fi
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'inf2216-grp11-webapp'
          path: '.'
          format: 'HTML'
          out: 'reports' # Report output directory
          args: >
            --scan composer.json
            --scan composer.lock
            --enableExperimental
            --suppression suppression.xml
      
      - name: Create suppression file if not exists
        run: |
          if [ ! -f "suppression.xml" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?>
            <suppressions xmlns="https://jeremylong.github.io/DependencyCheck/dependency-suppression.1.3.xsd">
            </suppressions>' > suppression.xml
          fi
      
      - name: Upload dependency check report
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: reports
      
      - name: Check for high-severity vulnerabilities
        run: |
          if grep -q "CRITICAL\|HIGH" reports/dependency-check-report.html; then
            echo "⚠️ HIGH OR CRITICAL VULNERABILITIES FOUND! Review the dependency check report."
            echo "This is set to not fail the build, but should be reviewed before production deployment."
          else
            echo "✅ No high or critical vulnerabilities found."
          fi
  
  build-test:
    name: Build & Test Docker Environment
    runs-on: ubuntu-latest
    needs: [lint, security-scan, dependency-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.17.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      
      - name: Build Docker images
        run: |
          # Create any missing directories that might be needed
          mkdir -p certbot/www
          mkdir -p certbot/renewal-hooks/post
          
          # Create a placeholder SSL certificate for local testing
          mkdir -p ssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout ssl/nginx-selfsigned.key \
            -out ssl/nginx-selfsigned.crt \
            -subj "/C=US/ST=State/L=City/O=Organization/CN=localhost"
          
          # Build the images without starting the services
          docker-compose build
          
          # List images to verify build
          echo "Listing all docker images:"
          docker images
          
          # Find the PHP image with the correct name pattern
          PHP_IMAGE_NAME="inf2216-grp11-webapp-php:latest"
          
          # Verify image exists
          if docker image inspect $PHP_IMAGE_NAME > /dev/null 2>&1; then
            echo "PHP image found: $PHP_IMAGE_NAME"
          else
            echo "Error: PHP image not found!"
            echo "Available images:"
            docker images
            exit 1
          fi
      
      - name: Start containers
        run: |
          # Start only essential services for testing
          docker-compose up -d php db web
          
          # Give services time to initialize
          sleep 20
      
      - name: Check container status
        run: |
          docker ps -a
          docker-compose ps
      
      - name: Check web server availability
        run: |
          # Try to connect to web server
          curl -k https://localhost:443 || echo "Could not connect to HTTPS, which is expected in CI environment"
          curl -I http://localhost:80 || echo "Could not connect to HTTP, which is expected in CI environment"
      
      - name: Check PHP service
        run: |
          # Create a test PHP file
          echo "<?php echo 'PHP is working!'; ?>" > app/test.php
          
          # Try to access it via the web service
          docker exec -it $(docker ps -qf name=php) php -v
          docker exec -it $(docker ps -qf name=php) php /var/www/html/test.php || echo "Could not execute PHP test file"
      
      - name: Check logs for errors
        run: |
          docker-compose logs
      
      - name: Clean up
        run: |
          docker-compose down -v
          docker system prune -af --volumes
  
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [build-test]
    if: always()
    steps:
      - name: Check build status
        if: needs.build-test.result == 'success'
        run: echo "✅ CI Pipeline passed successfully! Ready for deployment."
      
      - name: Check build failure
        if: needs.build-test.result != 'success'
        run: echo "❌ CI Pipeline failed. Please check the logs for details."